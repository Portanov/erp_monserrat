<div class="m-8 mt-16 h-screen">
  <p-dialog [header]="editingGroupId ? 'Editar Grupo' : 'Crear Grupo'" [modal]="true"
    [visible]="createVisible || editVisible" (onHide)="closeDialog()"
    [style]="{ width: '50rem' }" [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }">
    <div class="flex flex-col gap-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label>Nombre</label>
          <input type="text" pInputText [(ngModel)]="newGroup.name" class="w-full">
        </div>
        <div>
          <label>Categoría</label>
          <input type="text" pInputText [(ngModel)]="newGroup.categoria" class="w-full">
        </div>
        <div>
          <label>Nivel</label>
          <p-select [options]="levels" [(ngModel)]="newGroup.nivel" optionLabel="label" optionValue="value"
            placeholder="Seleccionar nivel" class="w-full"></p-select>
        </div>
        <div>
          <label>Miembros</label>
          <p-inputnumber class="w-full" [(ngModel)]="newGroup.miembros" />
        </div>
        <div>
          <label>Tickets</label>
          <input type="number" pInputText [(ngModel)]="newGroup.tickets" class="w-full">
        </div>
      </div>




    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" icon="pi pi-times" (onClick)="closeDialog()"
        severity="secondary"></p-button>
      <p-button label="Guardar" icon="pi pi-check" (onClick)="saveGroup()" severity="primary"></p-button>
    </ng-template>
  </p-dialog>
  <h1>Grupos</h1>
  <div class="grid grid-cols-5 gap-0">
    <div class="col-span-4 p-4">
      <p>Total: <p-chip [label]="groups.length.toString()"></p-chip></p>
      <p class="mt-2">Advance:</p>
      <div class="grid grid-cols-2 gap-2">
        @for ( group of groups; track group.id) {
        <p-card class="mt-3">
          <ng-template #header>
            <div class="grid grid-cols-2 p-4 pb-0">
              <h2 class="text-2xl">{{ group.name }}</h2>
              <div class="justify-end flex gap-2">
                <p-button label="Editar Grupo" [rounded]="true" icon="pi pi-pencil" size="small" variant="outlined"
                  severity="primary" (onClick)="openEditDialog(group)"></p-button>
                <p-button [rounded]="true" icon="pi pi-times" size="small" variant="outlined" severity="secondary"
                  (onClick)="deleteGroup(group.id)"></p-button>
              </div>
            </div>
            <div class="p-4 pb-0 pt-0">
              <p-chip [label]="group.categoria" class="text-xs"></p-chip>
            </div>
          </ng-template>
          <div class="grid grid-cols-3">
            <div class="flex flex-col items-center">
              <div class="font-light">Nivel</div>
              <div class="font-bold">{{ group.nivel }}</div>
            </div>
            <div class="flex flex-col items-center">
              <div class="font-light">Miembros</div>
              <div class="font-bold">{{ group.miembros }}</div>
            </div>
            <div class="flex flex-col items-center">
              <div class="font-light">Tickets</div>
              <div class="font-bold">{{ group.tickets }}</div>
            </div>
          </div>
          <p-progressbar [value]="50" class="mt-2"></p-progressbar>
          <div class="items-center mt-2 flex">
            <p class="font-light italic">Creado por:</p> <p-chip [label]="'@' + group.autor"
              image="images/gato_soldado.jpg" class="text-sm ms-3"></p-chip>
          </div>
        </p-card>
        } @empty {
        <p>No hay grupos disponibles.</p>
        }
      </div>
    </div>
    <div class="p-4 bg-gray-900 rounded-lg h-screen">
      <p-panelmenu [model]="items" [style]="{'width':'width'}"></p-panelmenu>
    </div>
  </div>
</div>
