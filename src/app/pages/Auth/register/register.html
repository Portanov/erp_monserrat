<div class="mb-4 p-8 justify-center items-center flex">
  <p-card header="Registro" class="w-md text-center">
    <form (ngSubmit)="onSubmit()" #f="ngForm" validate class="flex flex-col gap-4">
      <p-iftalabel>
        <input pInputText name="username" id="username" autocomplete="off" class="w-full" [(ngModel)]="model.username" required minlength="3" />
        <label for="username">Usuario</label>
      </p-iftalabel>
      <div class="error" *ngIf="f.controls.username?.invalid && (f.controls.username?.touched || f.submitted)">
        <small *ngIf="f.controls.username?.errors?.required">El usuario es obligatorio.</small>
        <small *ngIf="f.controls.username?.errors?.minlength">Mínimo 3 caracteres.</small>
      </div>

      <p-iftalabel>
        <input pInputText type="email" name="email" id="email" class="w-full" [(ngModel)]="model.email" required email />
        <label for="email">Email</label>
      </p-iftalabel>
      <div class="error" *ngIf="f.controls.email?.invalid && (f.controls.email?.touched || f.submitted)">
        <small *ngIf="f.controls.email?.errors?.required">El email es obligatorio.</small>
        <small *ngIf="f.controls.email?.errors?.email">Formato de email inválido.</small>
      </div>

      <p-iftalabel>
        <input pInputText type="password" name="password" id="password" class="w-full" [(ngModel)]="model.password" required minlength="6" />
        <label for="password">Contraseña</label>
      </p-iftalabel>
      <div class="error" *ngIf="f.controls.password?.invalid && (f.controls.password?.touched || f.submitted)">
        <small *ngIf="f.controls.password?.errors?.required">La contraseña es obligatoria.</small>
        <small *ngIf="f.controls.password?.errors?.minlength">Mínimo 6 caracteres.</small>
      </div>

      <p-iftalabel>
        <input pInputText type="password" name="confirmPassword" id="confirmPassword" class="w-full" [(ngModel)]="model.confirmPassword" required />
        <label for="confirmPassword">Confirmar contraseña</label>
      </p-iftalabel>
      <div class="error" *ngIf="(f.controls.confirmPassword?.touched || f.submitted) && !passwordsMatch()">
        <small>Las contraseñas no coinciden.</small>
      </div>

      <p-iftalabel>
        <input pInputText name="fullName" id="fullName" class="w-full" [(ngModel)]="model.fullName" required />
        <label for="fullName">Nombre completo</label>
      </p-iftalabel>
      <div class="error" *ngIf="f.controls.fullName?.invalid && (f.controls.fullName?.touched || f.submitted)">
        <small>El nombre completo es obligatorio.</small>
      </div>

      <p-iftalabel>
        <input pInputText name="address" id="address" class="w-full" [(ngModel)]="model.address" required />
        <label for="address">Dirección</label>
      </p-iftalabel>
      <div class="error" *ngIf="f.controls.address?.invalid && (f.controls.address?.touched || f.submitted)">
        <small>La dirección es obligatoria.</small>
      </div>

      <div class="mt-4">
        <p-button [disabled]="f.invalid || !passwordsMatch()" type="submit" class="font-bold">Registrarse</p-button>
      </div>
    </form>
  </p-card>
</div>
