<div class="p-8 justify-around items-center flex h-screen">
  <p-card class="w-md text-center">
    <ng-template #header>
      <h1 class="mt-4 text-4xl modak-regular">Iniciar Sesión</h1>
    </ng-template>
    <form (ngSubmit)="onSubmit()" #f="ngForm" validate class="flex flex-col gap-4">
      <p-iftalabel>
        <input pInputText name="identifier" id="identifier" autocomplete="off" class="w-full" #identifier="ngModel"
          [(ngModel)]="model.identifier" [invalid]="identifier.invalid && (identifier.touched || f.submitted)" required
          minlength="3" />
        <label for="identifier">Usuario o Email</label>
      </p-iftalabel>
      @if (identifier.invalid && (identifier.touched || f.submitted)) {
      <p-message severity="error" size="small" variant="simple">Usuario o email obligatorio</p-message>
      }

      <p-iftalabel>
        <input pInputText type="password" name="password" id="password" class="w-full" #password="ngModel"
          [(ngModel)]="model.password" [invalid]="password.invalid && (password.touched || f.submitted)" required />
        <label for="password">Contraseña</label>
      </p-iftalabel>
      @if (password.invalid && (password.touched || f.submitted)) {
      <p-message severity="error" size="small" variant="simple">La contraseña es obligatoria.</p-message>
      }

      <div class="mt-1">
        <p-button type="submit" class="font-bold">Acceder</p-button>
      </div>
    </form>
    <p class="mt-2 text-xs"> ¿No tienes una cuenta? <a [routerLink]="'/register'" class="text-primary">Registrate</a>
    </p>
  </p-card>
</div>
